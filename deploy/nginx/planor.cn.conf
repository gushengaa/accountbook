# 部署路径：/etc/nginx/sites-available/planor.cn
# 域名 www.planor.cn，API 路径 /accountbook/
# 服务器 IP：124.222.233.110（腾讯云）

upstream accountbook_api {
    least_conn;
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name www.planor.cn planor.cn;

    client_max_body_size 20M;

    location /accountbook/health {
        proxy_pass http://accountbook_api/accountbook/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location /accountbook/ {
        proxy_pass http://accountbook_api/accountbook/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /accountbook;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        return 200 'planor.cn - AccountBook API at /accountbook/api';
        add_header Content-Type text/plain;
    }
}
